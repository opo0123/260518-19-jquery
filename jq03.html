<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>jquery 함수</title>

    <style>
      .box {
        width: 100px;
        height: 100px;
        background-color: pink;
      }
    </style>
    <script src="js/jquery-3.7.1.min.js"></script>
  </head>
  <body>
    <h1 id="hi">하이</h1>
    <div class="box"></div>
    <script>
      function h1() {
        console.log("하이");
      }
      h1();

      function changeText() {
        $("#hi").text("안녕");
      }
      changeText();

      function hideBox() {
        $(".box").hide();
      }
      hideBox();
    </script>
  </body>
</html>
