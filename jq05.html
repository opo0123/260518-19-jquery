<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>jquery 애니메이트 (animate)</title>
    <style>
      .box {
        position: relative;
        width: 150px;
        height: 150px;
        background-color: pink;
        margin: 10px;
      }
      .btns {
        position: relative;
        top: 200px;
        left: 10px;
      }
    </style>
    <script src="js/jquery-3.7.1.min.js"></script>
    <script src="js/animate.js"></script>
  </head>
  <body>
    <div class="box">box</div>
    <div class="btns">
      <button class="move">이동</button>
      <button class="resize">크기 변경</button>
      <button class="fade">보였다 사라지기</button>
      <button class="all">모든 애니메이션</button>
    </div>
  </body>
</html>
